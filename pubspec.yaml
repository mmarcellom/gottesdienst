name: tertius
description: "Tertius — Transcribed Messages for Church Services"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # YouTube
  youtube_explode_dart: ^2.3.5
  youtube_player_iframe: ^5.2.0

  # Audio / Transcription
  http: ^1.2.0
  http_parser: ^4.0.0

  # Auth & Backend
  supabase_flutter: ^2.8.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Utils
  shared_preferences: ^2.3.0
  wakelock_plus: ^1.2.8
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
